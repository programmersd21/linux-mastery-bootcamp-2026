version: '3.8'

services:
  linux-bootcamp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linux-mastery-lab
    volumes:
      - ../../:/course
      - linux-home:/home/student
    working_dir: /course
    stdin_open: true
    tty: true
    privileged: true
    command: /bin/bash

  web-server:
    image: nginx:alpine
    container_name: web-lab
    ports:
      - "8080:80"
    volumes:
      - ../../01-foundations/labs/web-content:/usr/share/nginx/html:ro

  db-server:
    image: postgres:16-alpine
    container_name: db-lab
    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: student
      POSTGRES_DB: bootcamp
    ports:
      - "5432:5432"

volumes:
  linux-home:
